<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Slots | Yoru Turf</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@800;900&family=Public+Sans:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Public Sans', sans-serif;
            background-color: #fcfbf7;
            color: #2b3a2a;
            margin: 0;
            padding: 20px 40px;
        }

        .brand-logo {
            font-family: 'Kanit', sans-serif;
            font-weight: 900;
            font-size: 28px;
            letter-spacing: -0.5px;
            text-transform: uppercase;
            color: #1b4d22;
            display: inline-flex;
            align-items: center;
        }

        .brand-logo::after {
            content: '●';
            color: #4ca64c;
            margin-left: 4px;
            font-size: 18px;
        }

        header nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 2px solid #eadeca;
        }

        .nav-links a {
            text-decoration: none;
            color: #2b3a2a;
            font-weight: 600;
            margin-left: 25px;
            font-size: 16px;
        }

        .booking-container {
            max-width: 500px;
            margin: 40px auto;
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #eadeca;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .calendar-header h2 {
            font-family: 'Kanit', sans-serif;
            font-weight: 800;
            font-size: 22px;
            margin: 0;
        }

        .month-nav-btn {
            background: none;
            border: 1px solid #eadeca;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            color: #2b3a2a;
        }

        .month-nav-btn:disabled {
            color: #adb5bd;
            border-color: #e9ecef;
            cursor: not-allowed;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            text-align: center;
        }

        .weekday {
            font-weight: 600;
            color: #7a8d78;
            font-size: 14px;
            padding-bottom: 10px;
        }

        .day {
            padding: 12px 0;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            background-color: #fcfbf7;
            border: 1px solid #eadeca;
        }

        .day:hover:not(.past-day):not(.empty) {
            border-color: #1b4d22;
        }

        .day.past-day {
            background-color: #e9ecef;
            color: #adb5bd;
            border-color: #dee2e6;
            cursor: not-allowed;
            pointer-events: none;
        }

        .day.empty {
            background: none;
            border: none;
            cursor: default;
            pointer-events: none;
        }

        .hidden {
            display: none !important;
        }

        .back-btn {
            background: none;
            border: 1px solid #eadeca;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 20px;
            color: #2b3a2a;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            color: #2b3a2a;
        }

        .custom-select {
            width: 100%;
            padding: 12px;
            font-family: 'Public Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            color: #2b3a2a;
            background-color: #fcfbf7;
            border: 1px solid #eadeca;
            border-radius: 8px;
            cursor: pointer;
            outline: none;
        }

        .price-summary {
            background-color: #f4f6f3;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            border: 1px solid #eadeca;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .price-row.total {
            border-top: 1px dashed #eadeca;
            margin-top: 10px;
            padding-top: 10px;
            font-weight: 600;
            font-size: 16px;
            color: #1b4d22;
        }

        .book-now-btn {
            width: 100%;
            font-family: 'Public Sans', sans-serif;
            font-weight: 600;
            font-size: 16px;
            padding: 14px;
            background-color: #1b4d22;
            color: #fcfbf7;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: block;
            text-align: center;
            text-decoration: none;
            box-sizing: border-box;
        }

        .book-now-btn:hover {
            background-color: #2b3a2a;
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <div class="brand-logo">Yoru Turf</div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="booking.html">Book Slots</a>
            </div>
        </nav>
    </header>

    <main>
        <div id="calendar-view" class="booking-container">
            <div class="calendar-header">
                <button id="prev-month-btn" class="month-nav-btn" onclick="changeMonth(-1)">Prev</button>
                <h2 id="month-year-title"></h2>
                <button class="month-nav-btn" onclick="changeMonth(1)">Next</button>
            </div>
            <div class="calendar-grid" id="calendar-days-container">
                </div>
        </div>

        <div id="time-view" class="booking-container hidden">
            <button class="back-btn" onclick="showCalendar()">← Back to Calendar</button>
            <h2 id="selected-date-title">Configure Match</h2>

            <div class="form-group">
                <label for="start-time-select">Select Match Start Time:</label>
                <select id="start-time-select" class="custom-select"></select>
            </div>

            <div class="form-group">
                <label for="duration-select">Select Duration:</label>
                <select id="duration-select" class="custom-select">
                    <option value="1">1 Hour</option>
                    <option value="1.5">1.5 Hours</option>
                    <option value="2">2 Hours</option>
                    <option value="3">3 Hours</option>
                </select>
            </div>

            <div class="price-summary">
                <div class="price-row">
                    <span>Advance Booking Deposit:</span>
                    <span>₹50</span>
                </div>
                <div class="price-row total">
                    <span>Total Deposit Due Now:</span>
                    <span>₹50</span>
                </div>
            </div>

            <a href="payment.html" class="book-now-btn">Confirm Booking & Pay Advance</a>
        </div>
    </main>

    <script>
        // Setup initial system tracking states to check the current date/time context
        let systemDate = new Date();
        let currentYear = systemDate.getFullYear();
        let currentMonth = systemDate.getMonth(); 

        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        
        let selectedYear, selectedMonth, selectedDay;

        // Initialize calendar view
        renderCalendar(currentMonth, currentYear);

        function renderCalendar(month, year) {
            const monthYearTitle = document.getElementById('month-year-title');
            const daysContainer = document.getElementById('calendar-days-container');
            const prevBtn = document.getElementById('prev-month-btn');

            monthYearTitle.innerText = `${monthNames[month]} ${year}`;
            daysContainer.innerHTML = '';

            // Disable 'Prev' button if user is looking at the current active calendar month
            if (year === systemDate.getFullYear() && month === systemDate.getMonth()) {
                prevBtn.disabled = true;
            } else {
                prevBtn.disabled = false;
            }

            // Inject weekday banners
            const weekdays = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
            weekdays.forEach(day => {
                const dayHeader = document.createElement('div');
                dayHeader.classList.add('weekday');
                dayHeader.innerText = day;
                daysContainer.appendChild(dayHeader);
            });

            // Calculate calendar month layout math details
            let firstDayIndex = new Date(year, month, 1).getDay();
            let firstDayShifted = firstDayIndex === 0 ? 6 : firstDayIndex - 1; // Align Sunday correctly to track 7
            let totalDaysInMonth = new Date(year, month + 1, 0).getDate();

            // 1. Fill empty preceding offset tiles
            for (let i = 0; i < firstDayShifted; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.classList.add('day', 'empty');
                daysContainer.appendChild(emptyCell);
            }

            // 2. Generate active layout dates with absolute chronological validation checkpoints
            for (let day = 1; day <= totalDaysInMonth; day++) {
                const dayCell = document.createElement('div');
                dayCell.classList.add('day');
                dayCell.innerText = day;

                let evaluationDate = new Date(year, month, day);
                let comparisonToday = new Date(systemDate.getFullYear(), systemDate.getMonth(), systemDate.getDate());

                // Rule Verification Checkpoint: Disable elapsed days
                if (evaluationDate < comparisonToday) {
                    dayCell.classList.add('past-day');
                } else {
                    dayCell.onclick = function() { selectDate(day, month, year); };
                }

                daysContainer.appendChild(dayCell);
            }
        }

        function changeMonth(direction) {
            currentMonth += direction;
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            } else if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            }
            renderCalendar(currentMonth, currentYear);
        }

        function selectDate(day, month, year) {
            selectedDay = day;
            selectedMonth = month;
            selectedYear = year;

            document.getElementById('calendar-view').classList.add('hidden');
            document.getElementById('time-view').classList.remove('hidden');
            document.getElementById('selected-date-title').innerText = `Slots for ${monthNames[month]} ${day}, ${year}`;
            
            populateSmartTimes();
        }

        function showCalendar() {
            document.getElementById('time-view').classList.add('hidden');
            document.getElementById('calendar-view').classList.remove('hidden');
        }

        function populateSmartTimes() {
            const startTimeSelect = document.getElementById('start-time-select');
            startTimeSelect.innerHTML = '';

            let isTodaySelected = (selectedYear === systemDate.getFullYear() && selectedMonth === systemDate.getMonth() && selectedDay === systemDate.getDate());
            let currentHourNow = systemDate.getHours();
            let currentMinuteNow = systemDate.getMinutes();

            for (let hour = 0; hour < 24; hour++) {
                // Keep 1 AM to 5 AM locked down for maintenance
                if (hour >= 1 && hour <= 5) continue; 

                let displayHour = hour % 12 === 0 ? 12 : hour % 12;
                let ampm = hour >= 12 ? 'PM' : 'AM';

                const increments = ['00', '15', '30', '45'];
                
                increments.forEach(minute => {
                    let numMinute = parseInt(minute);

                    // Dynamic Real-Time Rule Checkpoint: If the date selected is TODAY, block elapsed minutes/hours
                    if (isTodaySelected) {
                        if (hour < currentHourNow || (hour === currentHourNow && numMinute <= currentMinuteNow)) {
                            return; // Skip generation to keep past intervals hidden
                        }
                    }

                    const option = document.createElement('option');
                    option.value = `${hour}:${minute}`;
                    option.innerText = `${displayHour}:${minute} ${ampm}`;
                    startTimeSelect.appendChild(option);
                });
            }
            
            // Fallback display warning if no available hours remain today
            if (startTimeSelect.options.length === 0) {
                const option = document.createElement('option');
                option.innerText = "No slots remaining for today";
                startTimeSelect.disabled = true;
                startTimeSelect.appendChild(option);
            } else {
                startTimeSelect.disabled = false;
            }
        }
    </script>
</body>
</html>
