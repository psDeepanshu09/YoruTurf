<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout | Yoru Turf</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@800;900&family=Public+Sans:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Public Sans', sans-serif;
            background-color: #fcfbf7;
            color: #2b3a2a;
            margin: 0;
            padding: 20px 40px;
        }

        .brand-logo {
            font-family: 'Kanit', sans-serif;
            font-weight: 900;
            font-size: 28px;
            letter-spacing: -0.5px;
            text-transform: uppercase;
            color: #1b4d22;
            display: inline-flex;
            align-items: center;
        }

        .brand-logo::after {
            content: '●';
            color: #4ca64c;
            margin-left: 4px;
            font-size: 18px;
        }

        header nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 2px solid #eadeca;
        }

        .nav-links a {
            text-decoration: none;
            color: #2b3a2a;
            font-weight: 600;
            margin-left: 25px;
            font-size: 16px;
        }

        .checkout-container {
            max-width: 500px;
            margin: 40px auto;
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #eadeca;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }

        h2 {
            font-family: 'Kanit', sans-serif;
            font-weight: 800;
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 20px;
        }

        h3 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #7a8d78;
            margin-bottom: 12px;
        }

        .order-summary {
            background-color: #f4f6f3;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #eadeca;
            margin-bottom: 25px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 15px;
        }

        .summary-row.total {
            border-top: 1px dashed #eadeca;
            margin-top: 12px;
            padding-top: 12px;
            font-weight: 600;
            font-size: 18px;
            color: #1b4d22;
        }

        .intent-pay-btn {
            display: block;
            width: 100%;
            font-family: 'Public Sans', sans-serif;
            font-weight: 600;
            font-size: 18px;
            padding: 16px;
            background-color: #1b4d22;
            color: #fcfbf7;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            box-sizing: border-box;
            margin-bottom: 25px;
        }

        .intent-pay-btn:hover {
            background-color: #2b3a2a;
        }

        .utr-box {
            border-top: 1px solid #eadeca;
            padding-top: 20px;
            margin-top: 10px;
        }

        .utr-input {
            width: 100%;
            padding: 12px;
            font-family: 'Public Sans', sans-serif;
            font-size: 14px;
            border: 1px solid #eadeca;
            border-radius: 6px;
            box-sizing: border-box;
            margin-top: 8px;
            margin-bottom: 15px;
            outline: none;
        }

        .utr-input:focus {
            border-color: #1b4d22;
        }

        .verify-btn {
            width: 100%;
            font-family: 'Public Sans', sans-serif;
            font-weight: 600;
            font-size: 15px;
            padding: 12px;
            background-color: #ffffff;
            color: #1b4d22;
            border: 1px solid #1b4d22;
            border-radius: 6px;
            cursor: pointer;
        }

        .verify-btn:hover {
            background-color: #f4f6f3;
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <div class="brand-logo">Yoru Turf</div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="booking.html">Book Slots</a>
            </div>
        </nav>
    </header>

    <main>
        <div class="checkout-container">
            <h2>Complete Your Booking</h2>

            <h3>Booking Summary</h3>
            <div class="order-summary">
                <div class="summary-row">
                    <span>Venue:</span>
                    <strong>Yoru Premium Turf</strong>
                </div>
                <div class="summary-row">
                    <span>Advance Booking Deposit:</span>
                    <span>₹50.00</span>
                </div>
                <div class="summary-row total">
                    <span>Amount Due Now:</span>
                    <span>₹50.00</span>
                </div>
            </div>

            <h3>Instant App Payment</h3>
            <a id="upi-intent-link" href="#" class="intent-pay-btn" onclick="handleIntentFallback(event)">
                📱 Open Payment App (Pay ₹50)
            </a>

            <div class="utr-box">
                <h3>Step 2: Verification</h3>
                <div class="form-group">
                    <label style="font-size: 14px; font-weight: 600; display: block;" for="utr-number">Enter 12-Digit UPI Ref No. / UTR after paying:</label>
                    <input type="text" id="utr-number" class="utr-input" placeholder="e.g. 3402XXXXXXXX" maxlength="12">
                </div>

                <button class="verify-btn" onclick="verifyAndNotify(event)">Verify & Send Confirmation</button>
            </div>
        </div>
    </main>

    <script>
        // CRITICAL MERCHANT REGISTRATION DATA INJECTED HERE
        const merchantUpiId = "9479499555@axl"; 
        const businessName = "Pawan Chouhan";
        const exactAmount = "50.00";
        
        // WhatsApp notification routing variable
        const destinationWhatsappPhone = "919479499555"; // Sent directly to your tracking number

        // Build the optimized deep link payload
        const upiIntentUrl = `upi://pay?pa=${encodeURIComponent(merchantUpiId)}&pn=${encodeURIComponent(businessName)}&am=${exactAmount}&cu=INR`;
        
        // Pass the constructed URL string directly into the launch button anchor tag
        document.getElementById('upi-intent-link').href = upiIntentUrl;

        function handleIntentFallback(event) {
            const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
            
            if (!isMobile) {
                event.preventDefault(); 
                alert(`Desktop View Detected!\n\nPlease open any UPI App (GPay, PhonePe, Paytm) on your phone and send exactly ₹${exactAmount} to:\n\nUPI ID: ${merchantUpiId}\nName: ${businessName}`);
            }
        }

        function verifyAndNotify(event) {
            const utrValue = document.getElementById('utr-number').value.trim();
            
            if (utrValue.length !== 12 || isNaN(utrValue)) {
                alert('Please enter a valid 12-digit UPI UTR / Ref number from your payment app before confirming.');
                return;
            }

            // Create text payload for WhatsApp routing
            const messageText = `⚡ NEW TURF BOOKING CONFIRMED! ⚡\n\nPayee: ${businessName}\nAmount Paid: ₹${exactAmount}\nUTR Ref Number: ${utrValue}\n\nVerify bank ledger and mark slot RED on calendar!`;
            const encodedMessage = encodeURIComponent(messageText);
            const whatsappUrl = `https://wa.me/${destinationWhatsappPhone}?text=${encodedMessage}`;

            alert('UTR recorded! Redirecting to WhatsApp to send your booking confirmation text to the ground manager...');
            window.location.href = whatsappUrl;
        }
    </script>
</body>
</html>
