<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoru Turf | Premium Cricket Arena</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,800;0,900;1,800;1,900&family=Public+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --window-blue: #0046ff;
            --window-bg: #e2f3fe;
            --cyber-white: #ffffff;
            --text-dark: #001246;
            --accent-cyan: #00d2ff;
        }

        body {
            font-family: 'Public Sans', sans-serif;
            background-color: #bfe3ff;
            background-image: radial-gradient(var(--accent-cyan) 1px, transparent 0), radial-gradient(var(--window-blue) 1px, transparent 0);
            background-size: 24px 24px;
            background-position: 0 0, 12px 12px;
            color: var(--text-dark);
            margin: 0;
            padding: 40px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        /* Main OS Window Frame */
        .window-container {
            width: 100%;
            max-width: 1100px;
            background-color: var(--window-bg);
            border: 4px solid var(--window-blue);
            border-radius: 12px;
            box-shadow: 12px 12px 0px rgba(0, 70, 255, 0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Top Title Bar Frame Component */
        .window-header {
            background-color: var(--window-blue);
            color: var(--cyber-white);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 4px solid var(--window-blue);
        }

        .brand-logo {
            font-family: 'Kanit', sans-serif;
            font-weight: 900;
            font-size: 24px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--cyber-white);
        }

        /* Retro Application Actions Frame */
        .window-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .control-icon {
            font-size: 18px;
            font-weight: 800;
            color: var(--cyber-white);
            cursor: pointer;
            user-select: none;
        }

        /* App Navigation Options Frame */
        .app-nav-bar {
            background-color: var(--cyber-white);
            padding: 10px 20px;
            display: flex;
            gap: 20px;
            border-bottom: 2px solid rgba(0, 70, 255, 0.15);
        }

        .app-nav-bar a {
            text-decoration: none;
            color: var(--window-blue);
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 4px 10px;
            border-radius: 4px;
            transition: all 0.15s ease;
        }

        .app-nav-bar a:hover, .app-nav-bar a.active {
            background-color: var(--window-blue);
            color: var(--cyber-white);
        }

        /* Main View Container Layout */
        .window-body {
            padding: 40px;
            display: flex;
            gap: 40px;
            align-items: center;
            position: relative;
        }

        .content-left {
            flex: 1.2;
            z-index: 2;
        }

        h1 {
            font-family: 'Kanit', sans-serif;
            font-weight: 900;
            font-style: italic;
            font-size: 52px;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            line-height: 0.95;
            color: var(--window-blue);
            margin: 0 0 20px 0;
        }

        .hero-desc {
            line-height: 1.6;
            font-size: 17px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.6);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--window-blue);
        }

        .cta-btn {
            display: inline-block;
            text-decoration: none;
            font-family: 'Public Sans', sans-serif;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 16px 32px;
            background-color: var(--cyber-white);
            color: var(--window-blue);
            border: 3px solid var(--window-blue);
            border-radius: 8px;
            font-size: 16px;
            box-shadow: 4px 4px 0px var(--window-blue);
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .cta-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--window-blue);
            background-color: var(--window-blue);
            color: var(--cyber-white);
        }

        .cta-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--window-blue);
        }

        .content-right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
        }

        .image-outer-border {
            width: 100%;
            padding: 4px;
            background-color: var(--cyber-white);
            border: 4px solid var(--window-blue);
            border-radius: 12px;
            box-shadow: 8px 8px 0px rgba(0, 70, 255, 0.15);
            overflow: hidden;
        }

        .hero-img {
            width: 100%;
            display: block;
            max-height: 400px;
            object-fit: cover;
            border-radius: 6px;
        }

        .pixel-star {
            position: absolute;
            font-size: 28px;
            color: var(--window-blue);
            user-select: none;
            opacity: 0.4;
            font-weight: bold;
        }
        .star-1 { top: 20px; right: 45%; animation: float 4s ease-in-out infinite; }
        .star-2 { bottom: 30px; left: 10px; animation: float 3.5s ease-in-out infinite 1s; }
        .star-3 { top: 40px; right: 20px; font-size: 20px; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @media (max-width: 900px) {
            body { padding: 15px; }
            .window-body { flex-direction: column; padding: 25px; text-align: center; }
            h1 { font-size: 38px; }
            .hero-desc { border-left: none; border-top: 4px solid var(--window-blue); }
            .star-1, .star-2, .star-3 { display: none; }
        }
    </style>
</head>
<body>

    <div class="window-container">
        <div class="window-header">
            <div class="brand-logo">YORU.EXE</div>
            <div class="window-controls">
                <span class="control-icon">_</span>
                <span class="control-icon">▢</span>
                <span class="control-icon">✕</span>
            </div>
        </div>

        <div class="app-nav-bar">
            <a href="index.html" class="active">Home</a>
            <a href="booking.html">Book Slots</a>
        </div>

        <div class="window-body">
            <div class="pixel-star star-1">✦</div>
            <div class="pixel-star star-2">✦</div>
            <div class="pixel-star star-3">✦</div>

            <div class="content-left">
                <h1>SMASH SIXES<br>UNDER THE<br>FLOODLIGHTS</h1>
                <div class="hero-desc">
                    Book the ultimate midnight cricket experience. Pay just ₹50 online to reserve your time slot, and pay the remaining balance directly at the turf after your match.
                </div>
                <a href="booking.html" class="cta-btn">Book Your Slot Now</a>
            </div>

            <div class="content-right">
                <div class="image-outer-border">
                    <img class="hero-img" src="turf iamge.png" alt="Cricket Turf">
                </div>
            </div>
        </div>
    </div>

</body>
</html>
