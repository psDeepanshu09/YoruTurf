<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Yoru Turf</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,800;0,900;1,800;1,900&family=Public+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --window-blue: #0046ff;
            --window-bg: #e2f3fe;
            --cyber-white: #ffffff;
            --text-dark: #001246;
            --accent-cyan: #00d2ff;
            --danger: #e3000f;
        }

        body {
            font-family: 'Public Sans', sans-serif;
            background-color: #bfe3ff;
            background-image: radial-gradient(var(--accent-cyan) 1px, transparent 0), radial-gradient(var(--window-blue) 1px, transparent 0);
            background-size: 24px 24px;
            background-position: 0 0, 12px 12px;
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            box-sizing: border-box;
        }

        .window-container {
            width: 100%;
            max-width: 600px;
            background-color: var(--window-bg);
            border: 4px solid var(--window-blue);
            border-radius: 12px;
            box-shadow: 8px 8px 0px rgba(0, 70, 255, 0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            margin-top: 10px;
            box-sizing: border-box;
        }

        .window-header {
            background-color: var(--window-blue);
            color: var(--cyber-white);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand-logo {
            font-family: 'Kanit', sans-serif;
            font-weight: 900;
            font-size: 24px;
            text-transform: uppercase;
            color: var(--cyber-white);
        }

        .window-controls {
            display: flex;
            gap: 12px;
        }

        .control-icon {
            font-size: 18px;
            font-weight: 800;
            color: var(--cyber-white);
            cursor: pointer;
            user-select: none;
        }

        .app-nav-bar {
            background-color: var(--cyber-white);
            padding: 10px 20px;
            display: flex;
            gap: 20px;
            border-bottom: 2px solid rgba(0, 70, 255, 0.15);
        }

        .app-nav-bar a {
            text-decoration: none;
            color: var(--window-blue);
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 4px 10px;
            border-radius: 4px;
            transition: all 0.15s ease;
        }

        .app-nav-bar a:hover, .app-nav-bar a.active {
            background-color: var(--window-blue);
            color: var(--cyber-white);
        }

        .window-body {
            padding: 16px;
            box-sizing: border-box;
        }

        /* ── LOGIN SCREEN ── */
        #login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
        }

        .lock-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .login-title {
            font-family: 'Kanit', sans-serif;
            font-weight: 900;
            font-style: italic;
            font-size: 26px;
            text-transform: uppercase;
            color: var(--window-blue);
            margin: 0 0 6px;
        }

        .login-sub {
            font-size: 13px;
            font-weight: 600;
            opacity: 0.6;
            margin: 0 0 24px;
        }

        .login-box {
            width: 100%;
            background-color: var(--cyber-white);
            border: 3px solid var(--window-blue);
            border-radius: 10px;
            box-shadow: 4px 4px 0px rgba(0, 70, 255, 0.12);
            padding: 20px;
            box-sizing: border-box;
        }

        .login-box label {
            display: block;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            color: var(--text-dark);
        }

        .login-input {
            width: 100%;
            padding: 13px 14px;
            font-family: 'Public Sans', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: var(--text-dark);
            background-color: var(--window-bg);
            border: 3px solid var(--window-blue);
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
            margin-bottom: 16px;
            letter-spacing: 2px;
        }

        .login-input:focus {
            box-shadow: 0 0 0 3px rgba(0, 70, 255, 0.15);
        }

        .login-btn {
            width: 100%;
            font-family: 'Public Sans', sans-serif;
            font-weight: 800;
            text-transform: uppercase;
            padding: 14px;
            background-color: var(--window-blue);
            color: var(--cyber-white);
            border: 3px solid var(--window-blue);
            border-radius: 8px;
            font-size: 15px;
            box-shadow: 4px 4px 0px rgba(0, 70, 255, 0.25);
            cursor: pointer;
            transition: all 0.15s ease;
            box-sizing: border-box;
        }

        .login-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px rgba(0, 70, 255, 0.25);
        }

        .login-error {
            color: var(--danger);
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            text-align: center;
            margin-top: 12px;
            display: none;
        }

        /* ── ADMIN DASHBOARD ── */
        #admin-screen { display: none; }

        .admin-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .admin-title {
            font-family: 'Kanit', sans-serif;
            font-weight: 900;
            font-style: italic;
            font-size: 24px;
            text-transform: uppercase;
            color: var(--window-blue);
            margin: 0;
        }

        .logout-btn {
            font-family: 'Public Sans', sans-serif;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 12px;
            padding: 6px 12px;
            background-color: var(--cyber-white);
            color: var(--danger);
            border: 2px solid var(--danger);
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 2px 2px 0px rgba(227, 0, 15, 0.2);
            transition: all 0.15s ease;
        }

        .logout-btn:hover {
            background-color: var(--danger);
            color: var(--cyber-white);
        }

        /* Stats bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 18px;
        }

        .stat-card {
            background-color: var(--cyber-white);
            border: 3px solid var(--window-blue);
            border-radius: 10px;
            padding: 14px;
            text-align: center;
            box-shadow: 3px 3px 0px rgba(0, 70, 255, 0.12);
        }

        .stat-number {
            font-family: 'Kanit', sans-serif;
            font-weight: 900;
            font-size: 28px;
            color: var(--window-blue);
            line-height: 1;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.6;
        }

        /* Date filter */
        .filter-row {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            align-items: center;
        }

        .filter-row label {
            font-weight: 800;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            white-space: nowrap;
        }

        .date-filter {
            flex: 1;
            padding: 10px 12px;
            font-family: 'Public Sans', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-dark);
            background-color: var(--cyber-white);
            border: 3px solid var(--window-blue);
            border-radius: 8px;
            outline: none;
            cursor: pointer;
        }

        .refresh-btn {
            font-family: 'Public Sans', sans-serif;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 12px;
            padding: 10px 14px;
            background-color: var(--cyber-white);
            color: var(--window-blue);
            border: 3px solid var(--window-blue);
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 3px 3px 0px rgba(0, 70, 255, 0.15);
            transition: all 0.15s ease;
            white-space: nowrap;
        }

        .refresh-btn:hover {
            background-color: var(--window-blue);
            color: var(--cyber-white);
        }

        /* Booking cards */
        .bookings-list { display: flex; flex-direction: column; gap: 10px; }

        .booking-entry {
            background-color: var(--cyber-white);
            border: 3px solid var(--window-blue);
            border-radius: 10px;
            padding: 14px;
            box-shadow: 3px 3px 0px rgba(0, 70, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .entry-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .entry-time {
            font-family: 'Kanit', sans-serif;
            font-weight: 900;
            font-size: 18px;
            color: var(--window-blue);
            line-height: 1.1;
        }

        .entry-duration {
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--text-dark);
            opacity: 0.6;
        }

        .cancel-btn {
            font-family: 'Public Sans', sans-serif;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 12px;
            padding: 6px 12px;
            background-color: var(--cyber-white);
            color: var(--danger);
            border: 2px solid var(--danger);
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 2px 2px 0px rgba(227, 0, 15, 0.15);
            transition: all 0.15s ease;
            white-space: nowrap;
        }

        .cancel-btn:hover {
            background-color: var(--danger);
            color: var(--cyber-white);
        }

        .entry-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
        }

        .entry-detail-item {
            font-size: 13px;
        }

        .entry-detail-item span:first-child {
            font-weight: 800;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.3px;
            opacity: 0.55;
            display: block;
        }

        .entry-detail-item span:last-child {
            font-weight: 700;
            color: var(--text-dark);
        }

        .empty-state {
            text-align: center;
            padding: 30px 0;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 0.5px;
            opacity: 0.5;
        }

        .hidden { display: none !important; }

        @media (min-width: 480px) {
            body { padding: 40px; }
            .window-container { margin-top: 20px; box-shadow: 12px 12px 0px rgba(0, 70, 255, 0.2); }
            .window-body { padding: 30px; }
            .stats-bar { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>

    <div class="window-container">
        <div class="window-header">
            <div class="brand-logo">YORU.EXE</div>
            <div class="window-controls">
                <span class="control-icon">_</span>
                <span class="control-icon">▢</span>
                <span class="control-icon">✕</span>
            </div>
        </div>

        <div class="app-nav-bar">
            <a href="index.html">Home</a>
            <a href="booking.html">Book Slots</a>
            <a href="live-slots.html">Live Slots</a>
            <a href="admin.html" class="active">Admin</a>
        </div>

        <div class="window-body">

            <!-- LOGIN SCREEN -->
            <div id="login-screen">
                <div class="lock-icon">🔐</div>
                <p class="login-title">Admin Access</p>
                <p class="login-sub">Yoru Turf Control Panel</p>
                <div class="login-box">
                    <label for="admin-password">Enter Password</label>
                    <input
                        type="password"
                        id="admin-password"
                        class="login-input"
                        placeholder="••••••••••••"
                        onkeydown="if(event.key==='Enter') attemptLogin()"
                    />
                    <button class="login-btn" onclick="attemptLogin()">Unlock Panel</button>
                    <p class="login-error" id="login-error">⚠ Incorrect password. Try again.</p>
                </div>
            </div>

            <!-- ADMIN DASHBOARD -->
            <div id="admin-screen">
                <div class="admin-header-row">
                    <h2 class="admin-title">Bookings</h2>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>

                <div class="stats-bar">
                    <div class="stat-card">
                        <div class="stat-number" id="stat-today">0</div>
                        <div class="stat-label">Today</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="stat-total">0</div>
                        <div class="stat-label">Total</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="stat-upcoming">0</div>
                        <div class="stat-label">Upcoming</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="stat-dates">0</div>
                        <div class="stat-label">Days Booked</div>
                    </div>
                </div>

                <div class="filter-row">
                    <label for="date-filter">Date:</label>
                    <input type="date" id="date-filter" class="date-filter" onchange="renderBookings()"/>
                    <button class="refresh-btn" onclick="loadAndRender()">↻ Refresh</button>
                </div>

                <div class="bookings-list" id="bookings-list"></div>
            </div>

        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = 'kaitops#hinata';
        let allBookings = {};

        // Check if already logged in this session
        if (sessionStorage.getItem('adminAuth') === 'true') {
            showDashboard();
        }

        function attemptLogin() {
            const input = document.getElementById('admin-password').value;
            const errorEl = document.getElementById('login-error');
            if (input === ADMIN_PASSWORD) {
                sessionStorage.setItem('adminAuth', 'true');
                errorEl.style.display = 'none';
                showDashboard();
            } else {
                errorEl.style.display = 'block';
                document.getElementById('admin-password').value = '';
            }
        }

        function logout() {
            sessionStorage.removeItem('adminAuth');
            document.getElementById('admin-screen').style.display = 'none';
            document.getElementById('login-screen').style.display = 'flex';
        }

        function showDashboard() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-screen').style.display = 'block';
            // Default date filter to today
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            document.getElementById('date-filter').value = `${yyyy}-${mm}-${dd}`;
            loadAndRender();
        }

        async function loadAndRender() {
            try {
                const res = await fetch('/api/bookings');
                const data = await res.json();
                if (data.success) {
                    allBookings = data.database || {};
                }
            } catch (err) {
                console.error("Could not load bookings:", err);
            }
            updateStats();
            renderBookings();
        }

        function updateStats() {
            const today = new Date();
            const todayKey1 = `${today.getFullYear()}-${today.getMonth()+1}-${today.getDate()}`;
            const todayKey2 = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

            let totalCount = 0;
            let todayCount = 0;
            let upcomingCount = 0;
            const todayMidnight = new Date(today.getFullYear(), today.getMonth(), today.getDate());

            Object.entries(allBookings).forEach(([dateKey, slots]) => {
                totalCount += slots.length;
                if (dateKey === todayKey1 || dateKey === todayKey2) {
                    todayCount += slots.length;
                }
                // Parse date key for upcoming check
                const parts = dateKey.split('-');
                if (parts.length === 3) {
                    const d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
                    if (d >= todayMidnight) upcomingCount += slots.length;
                }
            });

            document.getElementById('stat-today').innerText = todayCount;
            document.getElementById('stat-total').innerText = totalCount;
            document.getElementById('stat-upcoming').innerText = upcomingCount;
            document.getElementById('stat-dates').innerText = Object.keys(allBookings).length;
        }

        function renderBookings() {
            const list = document.getElementById('bookings-list');
            list.innerHTML = '';

            const filterVal = document.getElementById('date-filter').value; // yyyy-mm-dd

            // Build display keys to match both padded and unpadded formats
            let keysToShow = [];
            if (filterVal) {
                const parts = filterVal.split('-');
                const unpadded = `${parts[0]}-${parseInt(parts[1])}-${parseInt(parts[2])}`;
                const padded = filterVal;
                keysToShow = [padded, unpadded].filter(k => allBookings[k]);
            } else {
                keysToShow = Object.keys(allBookings);
            }

            // Deduplicate (padded + unpadded may point to same data)
            const seen = new Set();
            let totalSlots = [];
            keysToShow.forEach(k => {
                const slots = allBookings[k] || [];
                slots.forEach((slot, idx) => {
                    const uid = `${k}-${idx}`;
                    if (!seen.has(uid)) {
                        seen.add(uid);
                        totalSlots.push({ dateKey: k, slot, idx });
                    }
                });
            });

            if (totalSlots.length === 0) {
                list.innerHTML = '<div class="empty-state">No bookings found for this date.</div>';
                return;
            }

            // Sort by start time
            totalSlots.sort((a, b) => {
                const aMin = a.slot.startHour * 60 + a.slot.startMin;
                const bMin = b.slot.startHour * 60 + b.slot.startMin;
                return aMin - bMin;
            });

            totalSlots.forEach(({ dateKey, slot, idx }) => {
                const startH = slot.startHour % 12 === 0 ? 12 : slot.startHour % 12;
                const startAmpm = slot.startHour >= 12 ? 'PM' : 'AM';
                const startMin = String(slot.startMin).padStart(2, '0');

                const endH = slot.endHour % 12 === 0 ? 12 : slot.endHour % 12;
                const endAmpm = slot.endHour >= 12 ? 'PM' : 'AM';
                const endMin = String(slot.endMin).padStart(2, '0');

                const durationMins = (slot.endHour * 60 + slot.endMin) - (slot.startHour * 60 + slot.startMin);
                const durationDisplay = durationMins % 60 === 0
                    ? `${durationMins / 60}h`
                    : `${Math.floor(durationMins / 60)}h ${durationMins % 60}m`;

                const entry = document.createElement('div');
                entry.classList.add('booking-entry');
                entry.innerHTML = `
                    <div class="entry-top">
                        <div>
                            <div class="entry-time">${startH}:${startMin} ${startAmpm} → ${endH}:${endMin} ${endAmpm}</div>
                            <div class="entry-duration">${durationDisplay} • ${dateKey}</div>
                        </div>
                        <button class="cancel-btn" onclick="cancelBooking('${dateKey}', ${idx})">Cancel</button>
                    </div>
                    <div class="entry-details">
                        <div class="entry-detail-item">
                            <span>Name</span>
                            <span>${slot.name || '—'}</span>
                        </div>
                        <div class="entry-detail-item">
                            <span>Phone</span>
                            <span>${slot.phone || '—'}</span>
                        </div>
                    </div>
                `;
                list.appendChild(entry);
            });
        }

        async function cancelBooking(dateKey, idx) {
            if (!confirm(`Cancel this booking? This cannot be undone.`)) return;
            try {
                const res = await fetch('/api/admin/cancel', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ dateKey, idx, password: ADMIN_PASSWORD })
                });
                const data = await res.json();
                if (data.success) {
                    await loadAndRender();
                } else {
                    alert("Could not cancel booking: " + data.message);
                }
            } catch (err) {
                alert("Server error. Could not cancel.");
            }
        }
    </script>
</body>
</html>
