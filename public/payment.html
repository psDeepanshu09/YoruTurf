<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout | Yoru Turf</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght=800;900&family=Public+Sans:wght=400;600&display=swap" rel="stylesheet">
    
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <style>
        body { font-family: 'Public Sans', sans-serif; background-color: #fcfbf7; color: #2b3a2a; margin: 0; padding: 20px 40px; }
        .brand-logo { font-family: 'Kanit', sans-serif; font-weight: 900; font-size: 28px; text-transform: uppercase; color: #1b4d22; display: inline-flex; align-items: center; }
        .brand-logo::after { content: '●'; color: #4ca64c; margin-left: 4px; font-size: 18px; }
        header nav { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 2px solid #eadeca; }
        .nav-links a { text-decoration: none; color: #2b3a2a; font-weight: 600; margin-left: 25px; }
        .checkout-container { max-width: 500px; margin: 40px auto; background-color: #ffffff; padding: 30px; border-radius: 12px; border: 1px solid #eadeca; }
        h2 { font-family: 'Kanit', sans-serif; font-weight: 800; font-size: 24px; margin-top: 0; }
        h3 { font-size: 14px; text-transform: uppercase; color: #7a8d78; }
        .order-summary { background-color: #f4f6f3; padding: 20px; border-radius: 8px; border: 1px solid #eadeca; margin-bottom: 25px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 15px; }
        .summary-row.total { border-top: 1px dashed #eadeca; margin-top: 12px; padding-top: 12px; font-weight: 600; font-size: 18px; color: #1b4d22; }
        .pay-btn { display: block; width: 100%; font-family: 'Public Sans', sans-serif; font-weight: 600; font-size: 18px; padding: 16px; background-color: #1b4d22; color: #fcfbf7; border: none; border-radius: 8px; cursor: pointer; text-align: center; }
        .pay-btn:hover { background-color: #2b3a2a; }
    </style>
</head>
<body>

    <header>
        <nav>
            <div class="brand-logo">Yoru Turf</div>
            <div class="nav-links"><a href="index.html">Home</a><a href="booking.html">Book Slots</a></div>
        </nav>
    </header>

    <main>
        <div class="checkout-container">
            <h2>Complete Your Booking</h2>
            <h3>Booking Summary</h3>
            <div class="order-summary">
                <div class="summary-row"><span>Venue:</span><strong>Yoru Premium Turf</strong></div>
                <div class="summary-row"><span>Selected Date:</span><strong id="display-date">Loading...</strong></div>
                <div class="summary-row"><span>Match Time Slot:</span><strong id="display-time">Loading...</strong></div>
                <div class="summary-row"><span>Duration:</span><strong id="display-duration">Loading...</strong></div>
                <div class="summary-row total"><span>Amount Due Now:</span><span>₹50.00</span></div>
            </div>

            <button class="pay-btn" onclick="initiateGatewayPayment()">Proceed to Gateway Payment</button>
        </div>
    </main>

    <script>
        const savedBooking = JSON.parse(sessionStorage.getItem('currentBooking'));

        if (savedBooking) {
            document.getElementById('display-date').innerText = savedBooking.date;
            document.getElementById('display-time').innerText = savedBooking.time;
            document.getElementById('display-duration').innerText = `${savedBooking.duration} Hour(s)`;
        } else {
            alert("No active session found.");
            window.location.href = "booking.html";
        }

        async function initiateGatewayPayment() {
            const response = await fetch('/api/payments/order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(savedBooking)
            });

            const orderData = await response.json();

            if (!orderData.success) {
                alert("Backend gateway failed to start. Verify server.js configuration keys.");
                return;
            }

            const paymentOptions = {
                "key": orderData.key_id,
                "amount": orderData.amount,
                "currency": "INR",
                "name": "Yoru Turf Co.",
                "description": "Slot Secure Deposit",
                "order_id": orderData.order_id,
                "handler": async function (paymentResponse) {
                    const verifyResponse = await fetch('/api/payments/verify', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            razorpay_order_id: paymentResponse.razorpay_order_id,
                            razorpay_payment_id: paymentResponse.razorpay_payment_id,
                            razorpay_signature: paymentResponse.razorpay_signature,
                            bookingDetails: savedBooking
                        })
                    });

                    const verificationResult = await verifyResponse.json();
                    if (verificationResult.success) {
                        alert("Booking Confirmed! Slot successfully blocked.");
                        window.location.href = "index.html";
                    } else {
                        alert("Cryptographic signature check failed. Security exception logged.");
                    }
                },
                "theme": { "color": "#1b4d22" }
            };

            const rzpWindow = new Razorpay(paymentOptions);
            rzpWindow.open();
        }
    </script>
</body>
</html>
