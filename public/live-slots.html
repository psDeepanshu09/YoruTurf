<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Slots Status | Yoru Turf</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,800;0,900;1,800;1,900&family=Public+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --window-blue: #0046ff;
            --window-bg: #e2f3fe;
            --cyber-white: #ffffff;
            --text-dark: #001246;
            --accent-cyan: #00d2ff;
        }

        body {
            font-family: 'Public Sans', sans-serif;
            background-color: #bfe3ff;
            background-image: radial-gradient(var(--accent-cyan) 1px, transparent 0), radial-gradient(var(--window-blue) 1px, transparent 0);
            background-size: 24px 24px;
            background-position: 0 0, 12px 12px;
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            box-sizing: border-box;
        }

        .window-container {
            width: 100%;
            max-width: 600px;
            background-color: var(--window-bg);
            border: 4px solid var(--window-blue);
            border-radius: 12px;
            box-shadow: 8px 8px 0px rgba(0, 70, 255, 0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            margin-top: 10px;
            box-sizing: border-box;
        }

        .window-header {
            background-color: var(--window-blue);
            color: var(--cyber-white);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 4px solid var(--window-blue);
        }

        .brand-logo {
            font-family: 'Kanit', sans-serif;
            font-weight: 900;
            font-size: 24px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--cyber-white);
        }

        .window-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .control-icon {
            font-size: 18px;
            font-weight: 800;
            color: var(--cyber-white);
            cursor: pointer;
            user-select: none;
        }

        .app-nav-bar {
            background-color: var(--cyber-white);
            padding: 10px 20px;
            display: flex;
            gap: 20px;
            border-bottom: 2px solid rgba(0, 70, 255, 0.15);
        }

        .app-nav-bar a {
            text-decoration: none;
            color: var(--window-blue);
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 4px 10px;
            border-radius: 4px;
            transition: all 0.15s ease;
        }

        .app-nav-bar a:hover, .app-nav-bar a.active {
            background-color: var(--window-blue);
            color: var(--cyber-white);
        }

        .window-body {
            padding: 16px;
            position: relative;
            box-sizing: border-box;
        }

        .page-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        h2 {
            font-family: 'Kanit', sans-serif;
            font-weight: 900;
            font-style: italic;
            font-size: 26px;
            text-transform: uppercase;
            color: var(--window-blue);
            margin: 0;
        }

        /* FIX: auto-refresh countdown label */
        .refresh-label {
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--window-blue);
            opacity: 0.6;
        }

        .status-legend {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-box {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            border: 2px solid var(--window-blue);
        }

        .legend-box.available { background-color: var(--cyber-white); }
        .legend-box.booked { background-color: var(--window-blue); }

        /* FIX: loading state */
        .loading-msg {
            text-align: center;
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            color: var(--window-blue);
            padding: 30px 0;
            letter-spacing: 0.5px;
        }

        /* FIX: friendly error message */
        .error-msg {
            background-color: #fff3cd;
            border: 2px solid #f0a500;
            border-radius: 8px;
            padding: 14px;
            font-size: 14px;
            font-weight: 700;
            color: #7a4f00;
            text-align: center;
        }

        .slots-timeline-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            width: 100%;
            box-sizing: border-box;
        }

        .timeline-slot {
            box-sizing: border-box;
            padding: 14px;
            font-size: 14px;
            font-weight: 800;
            border-radius: 8px;
            text-align: center;
            background-color: var(--cyber-white);
            border: 2px solid var(--window-blue);
            color: var(--text-dark);
            box-shadow: 2px 2px 0px rgba(0, 70, 255, 0.15);
            text-transform: uppercase;
        }

        .timeline-slot.booked-active {
            background-color: var(--window-blue);
            color: var(--cyber-white);
            box-shadow: none;
        }

        @media (min-width: 480px) {
            body { padding: 40px; }
            .window-container { margin-top: 20px; box-shadow: 12px 12px 0px rgba(0, 70, 255, 0.2); }
            .window-body { padding: 30px; }
            .slots-timeline-grid { grid-template-columns: repeat(3, 1fr); gap: 12px; }
            .timeline-slot { font-size: 15px; border-width: 3px; }
        }
    </style>
</head>
<body>

    <div class="window-container">
        <div class="window-header">
            <div class="brand-logo">YORU.EXE</div>
            <div class="window-controls">
                <span class="control-icon">_</span>
                <span class="control-icon">▢</span>
                <span class="control-icon">✕</span>
            </div>
        </div>

        <div class="app-nav-bar">
            <a href="index.html">Home</a>
            <a href="booking.html">Book Slots</a>
            <a href="live-slots.html" class="active">Live Slots</a>
        </div>

        <div class="window-body">
            <div class="page-header">
                <h2>Today's Live Monitor</h2>
                <!-- FIX: shows auto-refresh countdown -->
                <span class="refresh-label" id="refresh-label">Refreshes in 30s</span>
            </div>
            <div class="status-legend">
                <div class="legend-item"><div class="legend-box available"></div><span>Available</span></div>
                <div class="legend-item"><div class="legend-box booked"></div><span>Booked</span></div>
            </div>

            <!-- FIX: loading state shown before data arrives -->
            <div id="timeline-container"><div class="loading-msg">⏳ Loading slots...</div></div>
        </div>
    </div>

    <script>
        async function fetchAndRenderTimeline() {
            const container = document.getElementById('timeline-container');

            try {
                const response = await fetch('/api/bookings');
                const data = await response.json();
                
                let liveBookingsMap = {};
                if (data.success) {
                    liveBookingsMap = data.database || {};
                }

                container.innerHTML = '';

                const today = new Date();
                const year = today.getFullYear();
                const monthUnpadded = today.getMonth() + 1;
                const dayUnpadded = today.getDate();
                const monthPadded = String(monthUnpadded).padStart(2, '0');
                const dayPadded = String(dayUnpadded).padStart(2, '0');

                // Try both padded and unpadded key formats for compatibility
                const activeBookings =
                    liveBookingsMap[`${year}-${monthPadded}-${dayPadded}`] ||
                    liveBookingsMap[`${year}-${monthUnpadded}-${dayUnpadded}`] ||
                    [];

                const grid = document.createElement('div');
                grid.classList.add('slots-timeline-grid');

                for (let hour = 0; hour < 24; hour++) {
                    if (hour >= 1 && hour <= 5) continue; // skip maintenance hours

                    let displayHour = hour % 12 === 0 ? 12 : hour % 12;
                    let ampm = hour >= 12 ? 'PM' : 'AM';

                    // FIX: check using minutes so partial-hour bookings (e.g. 5:30 PM start)
                    // are correctly detected for every whole-hour slot they overlap
                    const slotStartMinutes = hour * 60;
                    const slotEndMinutes = slotStartMinutes + 60;

                    let isSlotTaken = false;
                    activeBookings.forEach(booking => {
                        const bookingStart = booking.startHour * 60 + booking.startMin;
                        const bookingEnd = booking.endHour * 60 + booking.endMin;
                        // Slot is taken if booking overlaps with this hour at all
                        if (bookingStart < slotEndMinutes && bookingEnd > slotStartMinutes) {
                            isSlotTaken = true;
                        }
                    });

                    const slotBlock = document.createElement('div');
                    slotBlock.classList.add('timeline-slot');
                    slotBlock.innerText = `${displayHour}:00 ${ampm} • ${isSlotTaken ? 'CLOSED' : 'OPEN'}`;
                    if (isSlotTaken) slotBlock.classList.add('booked-active');

                    grid.appendChild(slotBlock);
                }

                container.appendChild(grid);

            } catch (err) {
                console.error("Could not render live slot timeline:", err);
                // FIX: user-friendly error message instead of dev jargon
                container.innerHTML = '<div class="error-msg">⚠️ Could not load live slot data. Please refresh the page.</div>';
            }
        }

        // FIX: auto-refresh every 30 seconds so data stays current
        let secondsLeft = 30;
        const refreshLabel = document.getElementById('refresh-label');

        function tick() {
            secondsLeft--;
            refreshLabel.innerText = `Refreshes in ${secondsLeft}s`;
            if (secondsLeft <= 0) {
                secondsLeft = 30;
                fetchAndRenderTimeline();
            }
        }

        fetchAndRenderTimeline();
        setInterval(tick, 1000);
    </script>
</body>
</html>
