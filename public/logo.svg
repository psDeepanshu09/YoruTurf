<svg width="200" height="200" viewBox="0 0 200 200" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Yoru Turf Logo</title>
<desc>Pixel art cricket ball logo for Yoru Turf</desc>

<style>
  .logo-text {
    font-family: 'Courier New', monospace;
    font-weight: 700;
    fill: #0046ff;
    letter-spacing: 2px;
    text-anchor: middle;
  }
  .sub-text {
    font-family: 'Courier New', monospace;
    font-weight: 400;
    fill: #0046ff;
    letter-spacing: 3px;
    text-anchor: middle;
    opacity: 0.6;
  }
</style>

<!-- Shadow -->
<ellipse cx="100" cy="158" rx="46" ry="6" fill="#0046ff" opacity="0.12"/>

<!-- Ball body pixel rows -->
<rect x="76" y="56" width="48" height="8" fill="#cc1a1a"/>
<rect x="64" y="64" width="72" height="8" fill="#cc1a1a"/>
<rect x="56" y="72" width="88" height="8" fill="#cc1a1a"/>
<rect x="48" y="80" width="104" height="8" fill="#cc1a1a"/>
<rect x="44" y="88" width="112" height="8" fill="#cc1a1a"/>
<rect x="40" y="96" width="120" height="8" fill="#cc1a1a"/>
<rect x="40" y="104" width="120" height="8" fill="#cc1a1a"/>
<rect x="40" y="112" width="120" height="8" fill="#cc1a1a"/>
<rect x="44" y="120" width="112" height="8" fill="#cc1a1a"/>
<rect x="48" y="128" width="104" height="8" fill="#cc1a1a"/>
<rect x="56" y="136" width="88" height="8" fill="#cc1a1a"/>
<rect x="64" y="144" width="72" height="8" fill="#cc1a1a"/>
<rect x="76" y="152" width="48" height="8" fill="#cc1a1a"/>

<!-- Highlight top-left -->
<rect x="68" y="72" width="24" height="4" fill="#e85555" opacity="0.6"/>
<rect x="60" y="76" width="16" height="4" fill="#e85555" opacity="0.4"/>

<!-- Dark shadow bottom-right -->
<rect x="116" y="136" width="24" height="4" fill="#8b0000" opacity="0.4"/>
<rect x="108" y="144" width="24" height="4" fill="#8b0000" opacity="0.3"/>

<!-- Center vertical divider -->
<rect x="96" y="56" width="8" height="104" fill="#a01010"/>

<!-- Left seam stitches -->
<rect x="84" y="64"  width="4" height="4" fill="#f5f0e8"/>
<rect x="80" y="72"  width="4" height="4" fill="#f5f0e8"/>
<rect x="80" y="80"  width="4" height="4" fill="#f5f0e8"/>
<rect x="84" y="88"  width="4" height="4" fill="#f5f0e8"/>
<rect x="84" y="96"  width="4" height="4" fill="#f5f0e8"/>
<rect x="80" y="104" width="4" height="4" fill="#f5f0e8"/>
<rect x="80" y="112" width="4" height="4" fill="#f5f0e8"/>
<rect x="84" y="120" width="4" height="4" fill="#f5f0e8"/>
<rect x="84" y="128" width="4" height="4" fill="#f5f0e8"/>
<rect x="80" y="136" width="4" height="4" fill="#f5f0e8"/>
<rect x="84" y="144" width="4" height="4" fill="#f5f0e8"/>

<!-- Right seam stitches -->
<rect x="112" y="64"  width="4" height="4" fill="#f5f0e8"/>
<rect x="116" y="72"  width="4" height="4" fill="#f5f0e8"/>
<rect x="116" y="80"  width="4" height="4" fill="#f5f0e8"/>
<rect x="112" y="88"  width="4" height="4" fill="#f5f0e8"/>
<rect x="112" y="96"  width="4" height="4" fill="#f5f0e8"/>
<rect x="116" y="104" width="4" height="4" fill="#f5f0e8"/>
<rect x="116" y="112" width="4" height="4" fill="#f5f0e8"/>
<rect x="112" y="120" width="4" height="4" fill="#f5f0e8"/>
<rect x="112" y="128" width="4" height="4" fill="#f5f0e8"/>
<rect x="116" y="136" width="4" height="4" fill="#f5f0e8"/>
<rect x="112" y="144" width="4" height="4" fill="#f5f0e8"/>

<!-- Horizontal seam stitches left side -->
<rect x="48"  y="104" width="4" height="4" fill="#f5f0e8"/>
<rect x="56"  y="100" width="4" height="4" fill="#f5f0e8"/>
<rect x="64"  y="104" width="4" height="4" fill="#f5f0e8"/>
<rect x="72"  y="100" width="4" height="4" fill="#f5f0e8"/>

<!-- Horizontal seam stitches right side -->
<rect x="124" y="104" width="4" height="4" fill="#f5f0e8"/>
<rect x="132" y="100" width="4" height="4" fill="#f5f0e8"/>
<rect x="140" y="104" width="4" height="4" fill="#f5f0e8"/>
<rect x="148" y="100" width="4" height="4" fill="#f5f0e8"/>

<!-- Pixel border outline -->
<rect x="76"  y="48"  width="48" height="8" fill="#6b0000"/>
<rect x="76"  y="160" width="48" height="8" fill="#6b0000"/>
<rect x="32"  y="96"  width="8"  height="48" fill="#6b0000"/>
<rect x="160" y="96"  width="8"  height="48" fill="#6b0000"/>

<!-- Text -->
<text x="100" y="185" class="logo-text" font-size="14">YORU TURF</text>
<text x="100" y="196" class="sub-text" font-size="7">CRICKET ARENA</text>

<!-- Pixel star decorations -->
<rect x="56" y="56" width="4" height="4" fill="#0046ff" opacity="0.35"/>
<rect x="60" y="60" width="4" height="4" fill="#0046ff" opacity="0.2"/>
<rect x="140" y="148" width="4" height="4" fill="#0046ff" opacity="0.35"/>
<rect x="136" y="152" width="4" height="4" fill="#0046ff" opacity="0.2"/>
</svg>
