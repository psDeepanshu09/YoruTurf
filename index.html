<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoru Turf | Premium Cricket Arena</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,800;0,900;1,800&family=Public+Sans:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
         
            font-family: 'Public Sans', sans-serif;
            background-color: #fcfbf7;
            color: #2b3a2a;
            margin: 0;
            padding: 20px 40px;
        }

        .brand-logo {
            font-family: 'Kanit', sans-serif;
            font-weight: 900;
            font-size: 28px;
            letter-spacing: -0.5px;
            text-transform: uppercase;
            color: #1b4d22;
            display: inline-flex;
            align-items: center;
        }

        .brand-logo::after {
            content: '●';
            color: #4ca64c;
            margin-left: 4px;
            font-size: 18px;
        }

        header nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 2px solid #eadeca;
        }

        .nav-links a {
            text-decoration: none;
            color: #2b3a2a;
            font-weight: 600;
            margin-left: 25px;
            font-size: 16px;
        }

        .nav-links a:hover {
            color: #1b4d22;
        }

        h1 {
            font-family: 'Kanit', sans-serif;
            font-weight: 800;
            font-size: 48px;
            text-transform: uppercase;
            letter-spacing: -1px;
            line-height: 1.05;
            color: #2b3a2a;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <div class="brand-logo">Yoru Turf</div>
            
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="booking.html">Book Slots</a>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero-section" style="margin-top: 60px; display: flex; gap: 40px;">
            
            <div class="hero-left" style="flex: 1;">
                <h1>SMASH SIXES UNDER THE FLOODLIGHTS</h1>
                <p style="line-height: 1.6; font-size: 17px; color: #4a5d48; margin-bottom: 25px;">
                    Book the ultimate midnight cricket experience. Pay just ₹50 online to reserve your time slot, and pay the remaining balance directly at the turf after your match.
                </p>
                <a href="booking.html" style="display: inline-block; text-decoration: none; font-family: 'Public Sans', sans-serif; font-weight: 600; padding: 14px 28px; background-color: #2b3a2a; color: #fcfbf7; border-radius: 4px; font-size: 16px; text-align: center;">
    Book Your Slot Now
</a>
            </div>

            <div class="hero-right" style="flex: 1; display: flex; align-items: center; justify-content: center;">
    
    <img class="hero-img" src="turf iamge.png" alt="Cricket Turf" style="width: 100%; max-height: 450px; object-fit: cover; border-radius: 8px;">

</div>

        </section>
    </main>

</body>
</html>
